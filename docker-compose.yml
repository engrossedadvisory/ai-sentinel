services:
  backend:
    build: ./backend
    container_name: ai-sentinel-backend
    # Ports are set by docker-compose.override.yml (generated by deploy.sh)
    # to use dynamically detected free ports. Do not add ports here.
    volumes:
      - governance_data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro   # read-only Docker socket for agent discovery
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:////app/data/governance.db
      - DISCOVERY_INTERVAL=300    # seconds between auto-discovery scans (default 5 min)
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build: ./frontend
    container_name: ai-sentinel-frontend
    # Ports are set by docker-compose.override.yml (generated by deploy.sh)
    # to use dynamically detected free ports. Do not add ports here.
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # ── Optional: local Ollama for on-premise AI ─────────────────────────────
  # Uncomment to run a local LLM alongside the platform.
  # Then set BRAIN_*_PROVIDER=ollama and OLLAMA_HOST=http://ollama:11434 in .env
  #
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: ai-sentinel-ollama
  #   volumes:
  #     - ollama_models:/root/.ollama
  #   ports:
  #     - "11434:11434"
  #   restart: unless-stopped
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: all
  #             capabilities: [gpu]

volumes:
  governance_data:
    driver: local
  # ollama_models:
  #   driver: local
